<style>

  @keyframes xpFloat       { 0%{transform:translateY(0);opacity:1}100%{transform:translateY(-70px);opacity:0} }
  @keyframes shake         { 0%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}100%{transform:translateX(0)} }

  .ring-animated { animation: ringFill 1.2s cubic-bezier(.4,0,.2,1) forwards; }

function TimerBar({ duration = 10, running, onExpire }) {
  const [width, setWidth] = useState$c(100);
  const [danger, setDanger] = useState$c(false);

  const raf = useRef$c(null);

    startTime.current = performance.now();
    const tick = (now) => {
      const elapsed = (now - startTime.current) / 1000;
      const pct = Math.max(0, 100 - (elapsed / duration) * 100);
      setWidth(pct); setDanger(pct < 30);
      if (pct <= 0) { if (onExpire) onExpire(); return; }
      raf.current = requestAnimationFrame(tick);
    };
    raf.current = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf.current);
  }, [running, duration, onExpire]);
  return (
    <div style={{ height:4, background:'var(--surface2)', borderRadius:2, overflow:'hidden' }}>
      <div style={{ height:'100%', width:`${width}%`, borderRadius:2, background: danger ? 'var(--danger)' : 'var(--accent)', transition:'background 0.3s', boxShadow: danger ? '0 0 8px var(--danger)' : 'none' }} />

const RouterCtx = createContext({ pathname: '/', search: '', navigate: function(){} });

function HashRouter({ children }) {
  function parse() {
    var raw = window.location.hash.replace(/^#/, '') || '/';
    var qi = raw.indexOf('?');
    return qi === -1 ? { pathname: raw, search: '' } : { pathname: raw.slice(0, qi), search: raw.slice(qi) };
  }
  const [loc, setLoc] = useState(parse);
  const navigate = useCallback(function(to) { window.location.hash = to; }, []);
  useEffect(function() {
    function h() { setLoc(parse()); }
    window.addEventListener('hashchange', h);
    return function() { window.removeEventListener('hashchange', h); };
  }, []);
  return <RouterCtx.Provider value={Object.assign({}, loc, { navigate: navigate })}>{children}</RouterCtx.Provider>;
}
function useNavigate() { return useContext(RouterCtx).navigate; }
function useLocation() { var ctx = useContext(RouterCtx); return { pathname: ctx.pathname, search: ctx.search }; }
function Routes({ children }) {
  var pathname = useContext(RouterCtx).pathname;
  var kids = React.Children.toArray(children);
  for (var i = 0; i < kids.length; i++) {
    var kid = kids[i];
    var pattern = kid.props.path || '';
    if (pattern === pathname) return kid.props.element;
    var pp = pattern.split('/'), lp = pathname.split('/');
    if (pp.length === lp.length && pp.every(function(seg, j) { return seg.charAt(0) === ':' || seg === lp[j]; })) return kid.props.element;

  return null;
}

function useProgress() {

  const answerQuestion = useCallback(function(quizId, correct, xpEarned, category) {

      var newHistory=p.quizHistory.concat([{quizId:quizId,correct:correct,date:today,xp:xpEarned}]);
      var newXp=correct?p.xp+xpEarned:p.xp, newLevel=getRank(newXp).rank, newTotal=p.totalQuestionsAnswered+1;
      var newMastery=correct&&category?Object.assign({},p.categoryMastery,{[category]:Math.min(100,(p.categoryMastery[category]||0)+Math.floor(xpEarned/4))}):p.categoryMastery;
      var newQueue=p.reviewQueue.slice(), existing=newQueue.find(function(i){return i.quizId===quizId;}), now=Date.now();
      if (correct) { if(existing){existing.interval=Math.round(existing.interval*2.5);existing.nextReview=now+existing.interval*86400000;}else{newQueue.push({quizId:quizId,interval:1,nextReview:now+86400000,critical:false});} }

      return Object.assign({},p,{xp:newXp,level:newLevel,quizHistory:newHistory,totalQuestionsAnswered:newTotal,categoryMastery:newMastery,reviewQueue:newQueue,badges:newBadges,lastStudyDate:today});
    });
  }, [update,getRank]);
  const defeatBoss = useCallback(function(bossId, badgeId) {
    update(function(p) {
      var newXp=p.xp+150, newLevel=getRank(newXp).rank;
      var newDefeated=[...new Set([...p.bossesDefeated,bossId])];

  const resetProgress = useCallback(function(){var f=getDefault();save(f);setProgress(f);}, []);

function QuizScreen({ progressHook }) {
  const { progress, answerQuestion, update } = progressHook;
  const { combo, multiplier, incrementCombo, resetCombo } = useCombo();
  const { hearts, consumeHeart, heartsEmpty } = useHearts(progress, update);
  const navigate = useNavigate();
  const location = useLocation();
  const params = new URLSearchParams(location.search);
  var hasParams = params.get('daily')||params.get('review')||params.get('type')||params.get('category')||params.get('topic');

  // All hooks must run before any conditional return (Rules of Hooks)
  const quizIds = useMemo(function() {
    if (!hasParams) return [];
    var allQ = window.HSA.QUIZZES;
    if (params.get('daily')) { var d = window.HSA.getDailyChallenge(); return d ? [d.id] : allQ.slice(0,10).map(function(q){return q.id;}); }
    if (params.get('review')) { var now = Date.now(); return progress.reviewQueue.filter(function(i){return i.nextReview<=now;}).sort(function(a,b){return a.nextReview-b.nextReview;}).slice(0,10).map(function(i){return i.quizId;}); }
    if (params.get('topic')==='bloodwork') { return allQ.filter(function(q){return q.type==='my_value'||q.type==='high_low';}).slice().sort(function(){return Math.random()-0.5;}).slice(0,10).map(function(q){return q.id;}); }
    if (params.get('topic')==='dosages') { return allQ.filter(function(q){return q.type==='dosage'||q.type==='dosage_timing';}).slice().sort(function(){return Math.random()-0.5;}).slice(0,10).map(function(q){return q.id;}); }
    if (params.get('topic')==='random') { return allQ.slice().sort(function(){return Math.random()-0.5;}).slice(0,10).map(function(q){return q.id;}); }
    if (params.get('type')) { return allQ.filter(function(q){return q.type===params.get('type');}).slice(0,10).map(function(q){return q.id;}); }
    if (params.get('category')) { return allQ.filter(function(q){return q.category===params.get('category');}).slice(0,15).map(function(q){return q.id;}); }
    return allQ.slice().sort(function(){return Math.random()-0.5;}).slice(0,10).map(function(q){return q.id;});
  }, [location.search]);

  const [idx, setIdx] = useState(0);
  const [answered, setAnswered] = useState(null);
  const [sessionXP, setSessionXP] = useState(0);
  const [results, setResults] = useState([]);
  const [done, setDone] = useState(false);
  const [showParticles, setShowParticles] = useState(false);
  const quizzes = quizIds.map(function(id){return window.HSA.QUIZZES.find(function(q){return q.id===id;});}).filter(Boolean);
  const current = quizzes[idx];

  const handleAnswer = useCallback(function(selectedAnswer) {
    if (!current || answered !== null) return;
    var correct = selectedAnswer === current.answer;
    var baseXP = current.xpReward || 10;
    var earned = correct ? Math.round(baseXP * multiplier) : 0;
    var isDaily = params.get('daily') === '1';
    if (correct) { incrementCombo(); setSessionXP(function(x){return x+earned;}); }
    else { resetCombo(); consumeHeart(); }
    answerQuestion(current.id, correct, earned, current.category);
    if (isDaily && correct) update(function(p){return Object.assign({},p,{dailyChallengeCompletedDate:new Date().toISOString().slice(0,10)});});
    setAnswered(correct ? 'correct' : 'wrong');
    setResults(function(r){return r.concat([{correct:correct,earned:earned}]);});
  }, [current, answered, multiplier, answerQuestion, update, incrementCombo, resetCombo, consumeHeart]);

  var handleContinue = useCallback(function() {
    if (heartsEmpty && answered === 'wrong') { setDone(true); return; }
    if (idx + 1 >= quizzes.length) {
      var allCorrect = results.every(function(r){return r.correct;});
      setDone(true);
      if (allCorrect) setShowParticles(true);
    } else {
      setIdx(function(i){return i+1;});
      setAnswered(null);
    }
  }, [heartsEmpty, answered, idx, quizzes.length, results]);

  if (!hasParams) return <QuizTopicPicker progressHook={progressHook} navigate={navigate} />;

  var correctCount = results.filter(function(r){return r.correct;}).length;
  var pct = results.length ? Math.round((correctCount/results.length)*100) : 0;

  if (done) return (
    <div style={{ maxWidth:480, margin:'0 auto', padding:'40px 20px 100px', textAlign:'center' }}>
      <ParticleExplosion active={showParticles} />
      <div className="anim-victory" style={{ fontSize:64, marginBottom:16 }}>{pct>=80?'🏆':pct>=60?'⭐':'📚'}</div>
      <div style={{ fontFamily:'DM Mono, monospace', fontSize:13, color:'var(--muted)', marginBottom:8, letterSpacing:'0.06em', textTransform:'uppercase' }}>Session Complete</div>
      <div style={{ fontSize:42, fontWeight:300, color:'var(--accent)', fontFamily:'DM Mono, monospace', marginBottom:4 }}>{pct}%</div>
      <div style={{ fontFamily:'DM Mono, monospace', fontSize:12, color:'var(--muted)', marginBottom:24 }}>{correctCount}/{results.length} correct</div>
      <div style={{ background:'var(--surface)', borderRadius:'var(--radius)', padding:16, border:'1px solid var(--border)', marginBottom:24 }}>
        <div style={{ fontFamily:'DM Mono, monospace', fontSize:12, color:'var(--xp-gold)' }}>+{sessionXP} XP earned</div>
      </div>
      <div style={{ display:'flex', gap:10, justifyContent:'center' }}>
        <button onClick={() => { setIdx(0);setAnswered(null);setResults([]);setDone(false);setSessionXP(0);resetCombo();setShowParticles(false); }} style={{ padding:'12px 24px', borderRadius:'var(--radius)', background:'var(--accent)', color:'#0e0e0f', border:'none', fontFamily:'DM Mono, monospace', fontSize:12, fontWeight:500, cursor:'pointer' }}>Play Again</button>
        <button onClick={() => navigate('/flashcards')} style={{ padding:'12px 24px', borderRadius:'var(--radius)', background:'var(--surface)', color:'var(--text)', border:'1px solid var(--border)', fontFamily:'DM Mono, monospace', fontSize:12, cursor:'pointer' }}>Flashcards</button>
      </div>
    </div>
  );

  return (
    <div style={{ maxWidth:480, margin:'0 auto', padding:'16px 16px 100px' }}>
      <div style={{ paddingTop:'env(safe-area-inset-top, 16px)', marginBottom:12 }}>
        <QuizProgressBar current={idx} total={quizzes.length} />
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginTop:8 }}>
          <HeartBar hearts={hearts} />
          <span style={{ fontFamily:'DM Mono, monospace', fontSize:11, color:'var(--muted)' }}>{idx+1}/{quizzes.length}</span>
          <span style={{ fontFamily:'DM Mono, monospace', fontSize:11, color:'var(--xp-gold)' }}>+{sessionXP} XP</span>
        </div>
      </div>
      {current && <QuizCard quiz={current} onAnswer={handleAnswer} answered={answered} combo={combo} multiplier={multiplier} hearts={hearts} />}
      {answered !== null && (
        <button onClick={handleContinue} style={{ width:'100%', marginTop:16, padding:'16px', borderRadius:'var(--radius)', background:'var(--accent)', color:'#0e0e0f', border:'none', fontFamily:'DM Mono, monospace', fontSize:13, fontWeight:500, letterSpacing:'0.06em', cursor:'pointer' }}>
          {idx + 1 >= quizzes.length ? 'FINISH →' : 'CONTINUE →'}
        </button>
      )}
    </div>
  );
}

// ── FlashcardsScreen ──────────────────────────────────────────────────────────
function FlashcardsScreen({ progressHook }) {
  const { addXP } = progressHook;
  const [mode, setMode] = useState('supplements');
  const [deck, setDeck] = useState(function(){return window.HSA.SUPPLEMENTS.slice().sort(function(){return Math.random()-0.5;});});
  const [known, setKnown] = useState([]);
  const [review, setReview] = useState([]);
  const [done, setDone] = useState(false);
  const current = deck[0];

  const switchMode = useCallback(function(newMode) {
    setMode(newMode);
    setKnown([]); setReview([]); setDone(false);
    if (newMode === 'supplements') setDeck(window.HSA.SUPPLEMENTS.slice().sort(function(){return Math.random()-0.5;}));
    else setDeck(window.HSA.BIOMARKERS.slice().sort(function(){return Math.random()-0.5;}));
  }, []);

  const handleSwipe = useCallback(function(direction, item) {
    if (direction==='right') { setKnown(function(k){return k.concat([item]);}); addXP(5, item.category || 'methylation'); }
    else setReview(function(r){return r.concat([item]);});
    setDeck(function(d) { var next = d.slice(1); if (next.length===0) setDone(true); return next; });
  }, [addXP]);

  const resetDeck = useCallback(function(fromReview) {
    var source = fromReview ? review : (mode==='supplements' ? window.HSA.SUPPLEMENTS : window.HSA.BIOMARKERS);
    setDeck(source.slice().sort(function(){return Math.random()-0.5;}));
    setKnown([]); setReview([]); setDone(false);
  }, [mode, review]);

  const ModeToggle = (
    <div style={{ display:'flex', background:'var(--surface2)', borderRadius:20, padding:3, gap:2, marginBottom:16 }}>
      {[['supplements','💊 Supplements'],['bloodwork','🩸 Bloodwork']].map(function([m,label]){
        const active = mode === m;
        return <button key={m} onClick={function(){if(!active)switchMode(m);}} style={{ flex:1, padding:'7px 0', borderRadius:18, background: active ? 'var(--accent)' : 'transparent', color: active ? '#0e0e0f' : 'var(--muted)', border:'none', fontFamily:'DM Mono, monospace', fontSize:11, fontWeight: active ? 500 : 400, cursor:'pointer', transition:'all 0.2s', letterSpacing:'0.04em' }}>{label}</button>;
      })}
    </div>
  );

  if (done) return (
    <div style={{ maxWidth:480, margin:'0 auto', padding:'60px 20px 100px', textAlign:'center' }}>
      <div style={{ fontSize:64, marginBottom:16 }}>{mode==='supplements' ? '🃏' : '🩸'}</div>
      <div style={{ fontFamily:'DM Mono, monospace', fontSize:13, color:'var(--muted)', marginBottom:8 }}>Deck Complete</div>
      <div style={{ display:'flex', gap:16, justifyContent:'center', margin:'20px 0' }}>
        <div style={{ textAlign:'center' }}><div style={{ fontSize:32, color:'var(--accent)', fontFamily:'DM Mono, monospace' }}>{known.length}</div><div style={{ fontFamily:'DM Mono, monospace', fontSize:10, color:'var(--muted)' }}>KNOW IT</div></div>
        <div style={{ textAlign:'center' }}><div style={{ fontSize:32, color:'var(--danger)', fontFamily:'DM Mono, monospace' }}>{review.length}</div><div style={{ fontFamily:'DM Mono, monospace', fontSize:10, color:'var(--muted)' }}>REVIEW</div></div>
      </div>
      <div style={{ display:'flex', gap:10, justifyContent:'center' }}>
        <button onClick={function(){resetDeck(false);}} style={{ padding:'12px 24px', borderRadius:'var(--radius)', background:'var(--accent)', color:'#0e0e0f', border:'none', fontFamily:'DM Mono, monospace', fontSize:12, fontWeight:500, cursor:'pointer' }}>Shuffle & Repeat</button>
        <button onClick={function(){if(review.length)resetDeck(true);}} disabled={!review.length} style={{ padding:'12px 24px', borderRadius:'var(--radius)', background:'var(--surface)', color:review.length?'var(--text)':'var(--muted)', border:'1px solid var(--border)', fontFamily:'DM Mono, monospace', fontSize:12, cursor:review.length?'pointer':'not-allowed' }}>Review Again ({review.length})</button>
      </div>
      <div style={{ marginTop:20 }}>{ModeToggle}</div>
    </div>
  );

  return (
    <div style={{ maxWidth:480, margin:'0 auto', padding:'16px 16px 100px' }}>
      <div style={{ paddingTop:'env(safe-area-inset-top, 16px)', marginBottom:12, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <div><h1 style={{ fontSize:22, fontWeight:300 }}>Flashcards</h1><div style={{ fontFamily:'DM Mono, monospace', fontSize:11, color:'var(--muted)', marginTop:4 }}>{deck.length} remaining</div></div>
        <div style={{ display:'flex', gap:12, fontFamily:'DM Mono, monospace', fontSize:11 }}>
          <span style={{ color:'var(--accent)' }}>✓ {known.length}</span>
          <span style={{ color:'var(--danger)' }}>↺ {review.length}</span>
        </div>
      </div>
      {ModeToggle}
      <div style={{ position:'relative', marginBottom:20 }}>
        {deck.slice(1,3).map(function(s,i){return <div key={s.id} style={{ position:'absolute', top:0, left:0, right:0, transform:`translateY(${(i+1)*8}px) scale(${1-(i+1)*0.04})`, opacity:1-(i+1)*0.25, zIndex:-i-1 }}><div style={{ height: mode==='supplements'?280:300, background:'var(--surface)', borderRadius:'var(--radius)', border:'1px solid var(--border)' }}/></div>;})}
        {current && mode==='supplements' && <FlashCard supplement={current} onSwipe={handleSwipe} />}
        {current && mode==='bloodwork' && <BiomarkerFlashCard marker={current} onSwipe={handleSwipe} />}
      </div>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', gap:12, padding:'0 8px' }}>
        <button onClick={function(){if(current) handleSwipe('left', current);}} style={{ flex:1, padding:'14px 0', borderRadius:'var(--radius)', background:'rgba(255,68,68,0.1)', border:'1px solid rgba(255,68,68,0.35)', color:'var(--danger)', fontFamily:'DM Mono, monospace', fontSize:13, fontWeight:500, cursor:'pointer', letterSpacing:'0.06em' }}>↺ REVIEW</button>
        <button onClick={function(){if(current) handleSwipe('right', current);}} style={{ flex:1, padding:'14px 0', borderRadius:'var(--radius)', background:'rgba(200,245,66,0.1)', border:'1px solid rgba(200,245,66,0.35)', color:'var(--accent)', fontFamily:'DM Mono, monospace', fontSize:13, fontWeight:500, cursor:'pointer', letterSpacing:'0.06em' }}>✓ KNOW IT</button>
      </div>
    </div>
  );
}

// ── BossBattleScreen ──────────────────────────────────────────────────────────
function BossBattleScreen({ progressHook }) {
  const { progress, defeatBoss, answerQuestion, update } = progressHook;
  const { combo, multiplier, incrementCombo, resetCombo } = useCombo();
  const { hearts, consumeHeart, heartsEmpty } = useHearts(progress, update);
  const navigate = useNavigate();
  const location = useLocation();
  const categoryId = location.pathname.split('/').pop();
  const boss = window.HSA.BOSSES.find(function(b){return b.category===categoryId;}) || window.HSA.BOSSES[0];
  const [phase, setPhase] = useState('entry');
  const [hp, setHp] = useState(boss.hp);
  const [dialogueIdx, setDialogueIdx] = useState(0);
  const [idx, setIdx] = useState(0);
  const [answered, setAnswered] = useState(null);
  const [timerKey, setTimerKey] = useState(0);
  const [showParticles, setShowParticles] = useState(false);
  const quizzes = (boss.quizIds||[]).map(function(id){return window.HSA.QUIZZES.find(function(q){return q.id===id;});}).filter(Boolean);
  const current = quizzes[idx % Math.max(quizzes.length, 1)];

  const handleAnswer = useCallback(function(selectedAnswer) {
    if (!current || answered !== null) return;
    var correct = selectedAnswer === current.answer;
    var earned = correct ? Math.round((current.xpReward||20)*multiplier) : 0;
    if (correct) {
      incrementCombo();
      var newHp = hp - 1;
      setHp(newHp);
      setDialogueIdx(Math.min(Math.floor((boss.hp-newHp)/(boss.hp/3)),2));
      if (newHp <= 0) { setPhase('victory'); setShowParticles(true); defeatBoss(boss.id, boss.badgeId); return; }
    } else {
      resetCombo(); consumeHeart();
      if (heartsEmpty) { setPhase('defeat'); return; }
    }
    answerQuestion(current.id, correct, earned, current.category);
    setAnswered(correct?'correct':'wrong');
    setTimeout(function(){ setIdx(function(i){return i+1;}); setAnswered(null); setTimerKey(function(k){return k+1;}); }, 1200);
  }, [current, answered, hp, boss, multiplier, heartsEmpty, answerQuestion, defeatBoss, incrementCombo, resetCombo, consumeHeart]);

  if (phase==='entry') return (
    <div style={{ maxWidth:480, margin:'0 auto', padding:'60px 20px', textAlign:'center', background:'#0e0e0f', minHeight:'100dvh', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center' }}>
      <div className="anim-boss-slam" style={{ fontSize:80, marginBottom:16 }}>{boss.emoji}</div>
      <div className="anim-bounce" style={{ fontFamily:'DM Mono, monospace', fontSize:20, color:'var(--danger)', letterSpacing:'0.08em', marginBottom:8 }}>{boss.name}</div>
      <div style={{ fontFamily:'DM Mono, monospace', fontSize:12, color:'var(--muted)', marginBottom:32, maxWidth:280, lineHeight:1.6 }}>{boss.dialogueLines[0]}</div>
      <button onClick={() => setPhase('battle')} className="anim-glow-pulse" style={{ padding:'16px 40px', borderRadius:'var(--radius-pill)', background:'var(--danger)', color:'white', border:'none', fontFamily:'DM Mono, monospace', fontSize:14, fontWeight:500, letterSpacing:'0.08em', cursor:'pointer' }}>BEGIN BATTLE</button>
    </div>
  );
  if (phase==='victory') return (
    <div style={{ maxWidth:480, margin:'0 auto', padding:'60px 20px 100px', textAlign:'center' }}>
      <ParticleExplosion active={showParticles} />
      <div className="anim-victory" style={{ fontSize:72, marginBottom:16 }}>🏆</div>
      <div style={{ fontFamily:'DM Mono, monospace', fontSize:18, color:'var(--xp-gold)', letterSpacing:'0.08em', marginBottom:12 }}>BOSS DEFEATED!</div>
      <div style={{ fontFamily:'DM Mono, monospace', fontSize:12, color:'var(--muted)', marginBottom:24, maxWidth:280, margin:'0 auto 24px', lineHeight:1.6 }}>{boss.dialogueLines[3]}</div>
      <div style={{ fontFamily:'DM Mono, monospace', fontSize:13, color:'var(--xp-gold)', marginBottom:24 }}>+150 XP + Badge Earned!</div>
      <div style={{ display:'flex', gap:10, justifyContent:'center' }}>
        <button onClick={() => navigate('/')} style={{ padding:'12px 24px', borderRadius:'var(--radius)', background:'var(--accent)', color:'#0e0e0f', border:'none', fontFamily:'DM Mono, monospace', fontSize:12, fontWeight:500, cursor:'pointer' }}>Home</button>
        <button onClick={() => navigate('/progress')} style={{ padding:'12px 24px', borderRadius:'var(--radius)', background:'var(--surface)', color:'var(--text)', border:'1px solid var(--border)', fontFamily:'DM Mono, monospace', fontSize:12, cursor:'pointer' }}>Trophy Room</button>
      </div>
    </div>
  );
  if (phase==='defeat') return (
    <div style={{ maxWidth:480, margin:'0 auto', padding:'60px 20px 100px', textAlign:'center' }}>
      <div style={{ fontSize:72, marginBottom:16, opacity:0.5 }}>💀</div>
      <div style={{ fontFamily:'DM Mono, monospace', fontSize:18, color:'var(--danger)', letterSpacing:'0.08em', marginBottom:12 }}>DEFEATED</div>
      <div style={{ fontFamily:'DM Mono, monospace', fontSize:12, color:'var(--muted)', marginBottom:24 }}>The boss overpowered your knowledge today. Study and return stronger.</div>
      <div style={{ display:'flex', gap:10, justifyContent:'center' }}>
        <button onClick={() => { setPhase('entry');setHp(boss.hp);setIdx(0);setAnswered(null);resetCombo(); }} style={{ padding:'12px 24px', borderRadius:'var(--radius)', background:'var(--danger)', color:'white', border:'none', fontFamily:'DM Mono, monospace', fontSize:12, cursor:'pointer' }}>Try Again</button>
        <button onClick={() => navigate('/learn')} style={{ padding:'12px 24px', borderRadius:'var(--radius)', background:'var(--surface)', color:'var(--text)', border:'1px solid var(--border)', fontFamily:'DM Mono, monospace', fontSize:12, cursor:'pointer' }}>Study First</button>
      </div>
    </div>
  );
  return (
    <div style={{ maxWidth:480, margin:'0 auto', padding:'16px 16px 100px' }}>
      <div style={{ paddingTop:'env(safe-area-inset-top, 16px)', marginBottom:12 }}>
        <BossHealthBar hp={hp} maxHp={boss.hp} />
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginTop:10 }}>
          <HeartBar hearts={hearts} />
          <div style={{ fontFamily:'DM Mono, monospace', fontSize:13, color:'var(--danger)' }}>{boss.emoji} {boss.name}</div>
        </div>
      </div>
      <TimerBar key={timerKey} duration={10} running={answered===null&&phase==='battle'} onExpire={() => handleAnswer('__timeout__')} />
      <div style={{ margin:'12px 0', padding:12, background:'var(--surface2)', borderRadius:'var(--radius)', fontFamily:'DM Mono, monospace', fontSize:11, color:'var(--muted)', fontStyle:'italic', lineHeight:1.5 }}>{boss.dialogueLines[Math.min(dialogueIdx, boss.dialogueLines.length-2)]}</div>
      {current && <QuizCard quiz={current} onAnswer={handleAnswer} answered={answered} combo={combo} multiplier={multiplier} hearts={hearts} />}
    </div>
  );
}

// ── BossSelectScreen ──────────────────────────────────────────────────────────
function BossSelectScreen({ progressHook }) {
  const { progress } = progressHook;
  const navigate = useNavigate();
  return (
    <div style={{ maxWidth:480, margin:'0 auto', padding:'16px 16px 100px' }}>
      <div style={{ paddingTop:'env(safe-area-inset-top, 16px)', marginBottom:16 }}>
        <h1 style={{ fontSize:22, fontWeight:300 }}>Boss Battles</h1>
        <div style={{ fontFamily:'DM Mono, monospace', fontSize:11, color:'var(--muted)', marginTop:4 }}>{progress.bossesDefeated.length}/8 defeated</div>
      </div>
      <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
        {window.HSA.BOSSES.map(function(boss) {
          var defeated = progress.bossesDefeated.includes(boss.id);
          var cat = window.HSA.CATEGORIES[boss.category] || {};
          return (
            <div key={boss.id} onClick={() => navigate('/boss/'+boss.category)} style={{ padding:16, background:'var(--surface)', borderRadius:'var(--radius)', border:`1px solid ${defeated?'var(--accent)':'var(--border)'}`, cursor:'pointer', display:'flex', alignItems:'center', gap:14, opacity:defeated?0.7:1 }}>
              <span style={{ fontSize:36 }}>{boss.emoji}</span>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:14, fontWeight:500 }}>{boss.name}</div>
                <div style={{ fontFamily:'DM Mono, monospace', fontSize:11, color:cat.color, marginTop:4 }}>{cat.label} · 10 Questions · 150 XP</div>
              </div>
              <span style={{ fontSize:20 }}>{defeated?'✓':'›'}</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── ProgressScreen ────────────────────────────────────────────────────────────
function ProgressScreen({ progressHook }) {
  const { progress, getRank } = progressHook;
  const rank = getRank(progress.xp);
  const calendarData = useMemo(function() {
    var days = [], history = progress.quizHistory || [], now = new Date();
    for (var i = 55; i >= 0; i--) {
      var d = new Date(now); d.setDate(now.getDate()-i);
      var ds = d.toISOString().slice(0,10);
      var dayH = history.filter(function(h){return h.date===ds;});
      days.push({ date:ds, count:dayH.length, xp:dayH.reduce(function(a,h){return a+(h.xp||0);},0) });
    }
    return days;
  }, [progress.quizHistory]);
  var maxXP = Math.max(1, ...calendarData.map(function(d){return d.xp;}));
  return (
    <div style={{ maxWidth:480, margin:'0 auto', padding:'16px 16px 100px' }}>
      <div style={{ paddingTop:'env(safe-area-inset-top, 16px)', marginBottom:16 }}><h1 style={{ fontSize:22, fontWeight:300 }}>Progress</h1></div>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8, marginBottom:12 }}>
        {[{label:'Total XP',value:progress.xp.toLocaleString()},{label:'Streak',value:progress.streak+'d'},{label:'Questions',value:progress.totalQuestionsAnswered},{label:'Bosses',value:progress.bossesDefeated.length+'/8'}].map(function(stat){return(
          <div key={stat.label} style={{ padding:14, background:'var(--surface)', borderRadius:'var(--radius)', border:'1px solid var(--border)', textAlign:'center' }}>
            <div style={{ fontFamily:'DM Mono, monospace', fontSize:20, color:'var(--accent)', fontWeight:500 }}>{stat.value}</div>
            <div style={{ fontFamily:'DM Mono, monospace', fontSize:10, color:'var(--muted)', marginTop:4, textTransform:'uppercase', letterSpacing:'0.06em' }}>{stat.label}</div>
          </div>
        );})}
      </div>
      <div style={{ padding:16, background:'var(--surface)', borderRadius:'var(--radius)', border:'1px solid var(--border)', marginBottom:12 }}>
        <div style={{ fontFamily:'DM Mono, monospace', fontSize:10, color:'var(--muted)', letterSpacing:'0.08em', textTransform:'uppercase', marginBottom:12 }}>Category Mastery</div>
        {Object.entries(window.HSA.CATEGORIES).map(function([key,cat]){
          var mastery = progress.categoryMastery[key]||0;
          return(
            <div key={key} style={{ marginBottom:10 }}>
              <div style={{ display:'flex', justifyContent:'space-between', marginBottom:4 }}><span style={{ fontSize:12 }}>{cat.emoji} {cat.label}</span><span style={{ fontFamily:'DM Mono, monospace', fontSize:11, color:cat.color }}>{mastery}%</span></div>
              <div style={{ height:4, background:'var(--surface2)', borderRadius:2 }}><div style={{ height:'100%', width:`${mastery}%`, background:cat.color, borderRadius:2, transition:'width 1s ease' }}/></div>
            </div>
          );
        })}
      </div>
      <div style={{ padding:16, background:'var(--surface)', borderRadius:'var(--radius)', border:'1px solid var(--border)', marginBottom:12 }}>
        <div style={{ fontFamily:'DM Mono, monospace', fontSize:10, color:'var(--muted)', letterSpacing:'0.08em', textTransform:'uppercase', marginBottom:12 }}>Activity (8 Weeks)</div>
        <div style={{ display:'grid', gridTemplateColumns:'repeat(8, 1fr)', gap:3 }}>
          {calendarData.map(function(d,i){var intensity=d.xp/maxXP;var bg=d.count===0?'var(--surface2)':intensity<0.3?'rgba(200,245,66,0.2)':intensity<0.7?'rgba(200,245,66,0.5)':'var(--accent)';return<div key={i} title={d.date+': '+d.xp+'XP'} style={{ aspectRatio:'1', borderRadius:3, background:bg }}/>;} )}
        </div>
      </div>
      <div style={{ padding:16, background:'var(--surface)', borderRadius:'var(--radius)', border:'1px solid var(--border)' }}>
        <div style={{ fontFamily:'DM Mono, monospace', fontSize:10, color:'var(--muted)', letterSpacing:'0.08em', textTransform:'uppercase', marginBottom:12 }}>Trophy Room — {progress.badges.length}/{window.HSA.BADGES.length} Earned</div>
        <div style={{ display:'grid', gridTemplateColumns:'repeat(5, 1fr)', gap:12 }}>
          {window.HSA.BADGES.map(function(badge){return <BadgeCard key={badge.id} badge={badge} earned={progress.badges.includes(badge.id)} small />;} )}
        </div>
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [disclaimerAccepted, setDisclaimerAccepted] = useState(
    function() { return localStorage.getItem('hsa_disclaimer_accepted') === 'true'; }
  );
  const progressHook = useProgress();
  const handleAccept = function() { localStorage.setItem('hsa_disclaimer_accepted','true'); setDisclaimerAccepted(true); };
  return (
    <HashRouter>
      {!disclaimerAccepted && <DisclaimerModal onAccept={handleAccept} />}
      <Routes>
        <Route path="/" element={<Dashboard progressHook={progressHook} />} />
        <Route path="/learn" element={<LearnScreen progressHook={progressHook} />} />
        <Route path="/biomarkers" element={<BiomarkersScreen progressHook={progressHook} />} />
        <Route path="/quiz" element={<QuizScreen progressHook={progressHook} />} />
        <Route path="/flashcards" element={<FlashcardsScreen progressHook={progressHook} />} />
        <Route path="/boss" element={<BossSelectScreen progressHook={progressHook} />} />
        <Route path="/boss/:categoryId" element={<BossBattleScreen progressHook={progressHook} />} />
        <Route path="/progress" element={<ProgressScreen progressHook={progressHook} />} />
      </Routes>
      <BottomNav />
    </HashRouter>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
} catch(e) {
  var el = document.getElementById('err');
  el.style.display = 'block';
  el.textContent = 'APP ERROR:\n' + e.message + '\n\n' + (e.stack || '');
}
</script>
</body>
</html>
